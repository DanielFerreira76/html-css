<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
    <style>
        mark{
            background-color: rgb(255, 30, 0);
        }
    </style>
</head>
<body>
    <h1>Principais Formatações</h1>
    <hr>
    <p>texto <strong>Negrito</strong> <br> texto <em>Itálico</em> <br> texto <mark>Marcado</mark> <br> texto <big>Grande</big> <br> texto <small>Pequeno</small> <br> texto <del>Deletado</del> <br> texto <ins>Inserido</ins> <br> texto <sup>Sobrescrito</sup> <br> texto <sub>Subscrito</sub>
    </p>
</body>
</html>
