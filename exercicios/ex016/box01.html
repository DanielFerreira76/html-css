<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Model 01</title>
    <style>
        h1 {
            text-align: center;
            height: 37px;
            width: 500px;
            background-color: #58508d;
            border: 5px solid #372f6b;
            padding: 2px;
            margin: 40px auto;
            outline: 10px dashed #7700ff
        }
        a {
            width: 25px;
            text-align: center;
            color: black;
            background-color: #663399;
            border: 5px solid black;
            padding: 5px 15px 5px 15px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Box Block-Level</h1>
    <p>Um parágrafo também é uma Box Block-Level, mas um <a href="#">link</a> é uma Box Inline-Level.</p>
</body>
</html>
